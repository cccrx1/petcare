<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI宠物健康管理系统</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css">
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body class="bg-gray-50">
    <!-- 导航栏 -->
    <nav id="navbar" class="bg-white shadow-md fixed w-full top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16">
                <div class="flex items-center">
                    <div class="flex-shrink-0">
                        <span class="text-2xl font-bold text-blue-600">🐾 PetCare</span>
                    </div>
                    <div class="hidden md:ml-6 md:flex md:space-x-8" id="nav-links">
                        <!-- 导航链接将通过JS动态生成 -->
                    </div>
                </div>
                <div class="flex items-center" id="nav-actions">
                    <!-- 用户操作将通过JS动态生成 -->
                </div>
            </div>
        </div>
    </nav>

    <!-- 主内容区域 -->
    <main class="pt-20 pb-10" id="main-content">
        <!-- 页面内容将通过JS动态加载 -->
    </main>

    <!-- 聊天窗口 -->
    <div id="chat-widget" class="fixed bottom-6 right-6 z-40">
        <button id="chat-toggle" class="bg-blue-600 text-white rounded-full w-14 h-14 flex items-center justify-center shadow-lg hover:bg-blue-700 transition">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"></path>
            </svg>
        </button>
    </div>

    <!-- 聊天窗口内容 -->
    <div id="chat-window" class="fixed bottom-24 right-6 w-96 h-96 bg-white rounded-lg shadow-xl z-40 hidden">
        <div class="bg-blue-600 text-white p-4 rounded-t-lg flex justify-between items-center">
            <h3 class="font-semibold">宠物健康助手</h3>
            <button id="chat-close" class="hover:bg-blue-700 rounded p-1">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                </svg>
            </button>
        </div>
        <div id="chat-messages" class="p-4 h-64 overflow-y-auto">
            <!-- 聊天消息 -->
        </div>
        <div class="p-4 border-t">
            <div class="flex">
                <input type="text" id="chat-input" class="flex-1 border rounded-l px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="输入您的问题...">
                <button id="chat-send" class="bg-blue-600 text-white px-4 py-2 rounded-r hover:bg-blue-700 transition">
                    发送
                </button>
            </div>
        </div>
    </div>

    <!-- Toast 通知容器 -->
    <div id="toast-container" class="fixed top-20 right-6 z-50"></div>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/chat.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
